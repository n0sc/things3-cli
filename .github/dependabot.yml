version: 2

updates:
  - package-ecosystem: "gomod"
    directory: "/"
    target-branch: "main"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/New_York"
    allow:
      - dependency-type: "direct"
    groups:
      gomod-all:
        patterns: ["*"]
        update-types: ["minor", "patch"]
    open-pull-requests-limit: 10
    assignees: ["n0sc"]
    labels: ["chore", "dependencies", "gomod"]
    commit-message:
      prefix: "chore"
      include: "scope"

  - package-ecosystem: "github-actions"
    directory: "/"
    target-branch: "main"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:15"
      timezone: "America/New_York"
    groups:
      ghactions-all:
        patterns: ["*"]
    open-pull-requests-limit: 10
    assignees: ["n0sc"]
    labels: ["chore", "dependencies", "github-actions"]
    commit-message:
      prefix: "chore"
      include: "scope"
